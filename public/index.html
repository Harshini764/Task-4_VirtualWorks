<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator with History</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Quote Generator</h1>
        <p>Fetch a random quote and keep your history.</p>
        <div id="statusMessage" class="status-message"></div>
      </header>

      <section class="quote-card">
        <div id="quoteText" class="quote-text">Press the button to get a quote.</div>
        <div id="quoteAuthor" class="quote-author"></div>
        <div class="actions">
          <button id="newQuoteBtn">New Quote</button>
          <button id="clearHistoryBtn" class="danger">Clear History</button>
        </div>
      </section>

      <section class="history-card">
        <h2>History</h2>
        <div id="historyList" class="history-list">No history yet.</div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
